# Read the Docs build configuration. https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    # Mirror the CI `docs` job exactly: use uv to build an ephemeral env from
    # docs/requirements.txt and render the site with mkdocs. --no-project skips
    # installing crossverify (mkdocstrings reads the source statically), so the
    # docs build pulls neither the runtime deps nor R.
    - pip install uv
    - uv run --no-project --with-requirements docs/requirements.txt
        mkdocs build --strict --site-dir "$READTHEDOCS_OUTPUT/html"
