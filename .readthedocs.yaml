# Read the Docs build configuration. https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    # Mirror the CI `docs` job exactly: install only the locked `docs` dependency
    # group (defined in pyproject.toml) and render the site with mkdocs.
    # `--only-group docs` pulls neither the runtime stack (pandas/statsmodels) nor
    # R — mkdocstrings reads the source statically via griffe.
    - pip install uv
    - uv run --only-group docs mkdocs build --strict --site-dir "$READTHEDOCS_OUTPUT/html"
