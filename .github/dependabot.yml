# Dependabot keeps dependencies and CI action pins current.
# It opens grouped pull requests on a weekly cadence; a maintainer reviews
# and merges them once CI is green. See issue #9.
version: 2
updates:
  # Python dependencies — uv-managed (pyproject.toml + uv.lock), runtime + dev.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    assignees:
      - "olivercrocco"
    groups:
      # Batch minor/patch bumps into one PR to limit noise; major bumps come
      # as separate PRs so breaking changes get individual review.
      python-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the workflows in .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
    assignees:
      - "olivercrocco"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
