name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync
      - name: Lint (ruff check)
        run: uv run ruff check .
      - name: Format check (ruff format --check)
        run: uv run ruff format --check .

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }}
      - name: Run tests
        run: uv run pytest -q
      # The worked example runs end-to-end; Phase 5 (cross-tool) auto-skips
      # because Rscript is absent on the default runner, so this asserts the
      # Python-only path stays green (exit 0).
      - name: Worked example (Python-only, Phase 5 auto-skips)
        run: uv run crossverify --project examples/project.yaml

  cross-tool:
    name: Cross-tool example (Python + R)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
      - name: Install R dependency (jsonlite)
        run: Rscript -e 'install.packages("jsonlite", repos = "https://cloud.r-project.org")'
      - name: Sync dependencies
        run: uv sync
      # With Rscript present, Phase 5 actually triangulates Python vs R — this
      # is the tool's signature check, so exercise it end-to-end (exit 0).
      - name: Worked example with Phase 5 (cross-tool) active
        run: uv run crossverify --project examples/project.yaml
